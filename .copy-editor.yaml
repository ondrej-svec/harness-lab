# Harness Lab copy-editor configuration.
#
# Consumed by the marvin:copy-editor skill from the Heart of Gold toolkit.
# Layer 1 is the deterministic typography engine (invoked via Bash).
# Layer 2 is judgment work the skill performs using the repo-local rule
# files pointed at below, composed with the baked-in Czech profile.
#
# Schema reference:
#   heart-of-gold-toolkit/plugins/marvin/skills/copy-editor/knowledge/config-schema.md
#
# Running:
#   bun ../heart-of-gold-toolkit/plugins/marvin/skills/copy-editor/scripts/copy-audit.ts --config .copy-editor.yaml
#   or (from an agent): invoke /marvin:copy-editor
#
# Verification boundary:
#   Layer 1 (deterministic) auto-closeable by the script.
#   Layer 2 (judgment) surfaces suggestions only. Czech visible-surface
#   signoff always requires a Czech-fluent human reviewer, per
#   docs/workshop-content-qa.md.

extends:
  - czech

language: cs

# Repo-local rule sources. Composed with the baked-in Czech profile.
rules:
  style_guide: ./content/style-guide.md
  reject_list: ./content/czech-reject-list.md
  examples: ./content/style-examples.md
  approved_terms: ./content/style-examples.md#approved-english-terms

# Voice doctrine — directive guidance injected into Layer 2 Pass D.
# Written in Czech because that is the working language of the review.
voice_doctrine: |
  Piš jako zkušený peer. Klidně, věcně, akčně.
  Žádný hype, žádný korporát, žádná škola.
  Krátké věty. Slovesa před podstatná jména.
  Na viditelných surfaces žádný anglický shorthand, pokud není
  skutečně ustálený technický termín.

paths:
  include:
    # Canonical bilingual source — highest priority.
    - workshop-content/agenda.json

    # Participant-facing Czech translations (post-2026-04-13 layout flip:
    # English is canonical at the root, Czech lives in locales/cs/).
    - content/project-briefs/locales/cs/**/*.md
    - content/challenge-cards/locales/cs/**/*.md
    - content/facilitation/locales/cs/**/*.md
    - content/talks/locales/cs/**/*.md
    - materials/locales/cs/**/*.md

    # Dashboard participant-facing Czech copy that currently lives in UI source files.
    - dashboard/lib/ui-language.ts
    - dashboard/lib/public-page-view-model.ts
    - dashboard/app/components/participant-room-surface.tsx

    # Czech-only root references (not bilingual pairs — these are
    # meta-documents about Czech writing). Still subject to the gate
    # when referenced directly, though most are excluded as rule sources.
    - content/style-guide.md
    - content/style-examples.md
    - content/czech-editorial-review-checklist.md
    - content/czech-reject-list.md

    # workshop-skill/ is intentionally NOT in the include list. Skill
    # reference docs are English-canonical per
    # docs/adr/2026-04-12-skill-docs-english-canonical.md. The agent
    # translates on the fly for non-English participants, so the
    # Czech typography gate does not apply.

  exclude:
    # English-canonical content at the root — Czech typography rules
    # must not be applied to English prose (would break greps and
    # introduce invisible non-breaking spaces on the English surface).

    # Generated bundle mirror — review the canonical source instead.
    - "harness-cli/assets/workshop-bundle/**"

    # Teaching files — these DOCUMENT the rules and contain illustrative
    # "Don't" examples that would be "fixed" into the "Do" versions by
    # --fix mode, silently destroying the lesson. They are rule sources,
    # not content the rules apply to.
    - "content/style-guide.md"
    - "content/style-examples.md"
    - "content/czech-reject-list.md"
    - "content/czech-editorial-review-checklist.md"

    # English dev-facing files under include patterns. These are authored
    # in English regardless of the workshop content language and must not
    # receive Czech typography rules (non-breaking space binding around
    # single-letter words, Czech quote marks, en-dash conventions, etc.).
    # Czech rules applied to English prose produce subtly broken text:
    # greps, regex matches, and exact string searches fail, and CI tests
    # that assert on specific phrases break in ways that are hard to
    # diagnose. Keep this list tight — only add files here that are truly
    # English-only.
    #
    # Note: the entire workshop-skill/ directory is excluded via the
    # include-list exclusion above (it is no longer in the include list),
    # so individual workshop-skill/*.md entries are unnecessary here.
    - "materials/coaching-codex.md"
    - "content/codex-craft.md"
    # Tests and generated artifacts.
    - "**/*.test.*"
    - "**/node_modules/**"
    - "**/.next/**"
    - "**/dist/**"
    - "dashboard/lib/generated/**"

  # Surface profile classification for Layer 2 Pass C (clarity/ambiguity).
  # participant = strict clarity bar (self-contained, no vague directives)
  # presenter   = outline tone allowed (facilitator explains live)
  # hybrid      = default, judgment applies leniently
  #
  # Rule: if a participant reads it alone without a facilitator present,
  # it is participant-facing. If a facilitator uses it as an outline and
  # speaks around it, it is presenter-facing. When in doubt, default to
  # hybrid and let the human reviewer decide.
  surface_profile:
    # Participant-facing (strict clarity)
    "content/project-briefs/**": participant
    "content/challenge-cards/**": participant
    "materials/**": participant
    "dashboard/lib/ui-language.ts": participant
    "dashboard/lib/public-page-view-model.ts": participant
    "dashboard/app/components/participant-room-surface.tsx": participant

    # Presenter-facing (outline tone OK)
    "content/talks/**": presenter
    "content/facilitation/**": presenter

    # Hybrid — bilingual source is consumed by both room projection
    # (presenter-ish) and participant mirrors (participant-ish).
    # Clarity pass applies with judgment.
    "workshop-content/agenda.json": hybrid

# Output conventions.
output:
  review_notes_dir: ./docs/reviews/workshop-content/

# Suppress findings on the same line or the line immediately below when
# this marker is present in a comment.
ignore_marker: "copy-editor: ignore"
