name: Bug Report
description: Report a reproducible bug in Harness Lab (CLI, dashboard, or workshop skill)
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the bug.
      placeholder: |
        1. Run `harness skill install`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (@harness-lab/cli)
        - Dashboard
        - Workshop skill
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CLI version (if applicable)
      description: Output of `harness --version`
      placeholder: "0.5.8"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, browser (if dashboard), or anything else relevant.
      placeholder: "Node 22.x, macOS 15, Chrome 130"
