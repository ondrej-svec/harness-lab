name: Dashboard E2E — update snapshots

on:
  workflow_dispatch:
    inputs:
      grep:
        description: "Playwright -g pattern (filter to a subset). Leave empty to update all."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: dashboard-e2e-update-snapshots
  cancel-in-progress: false

jobs:
  update-snapshots:
    name: update-snapshots (self-hosted)
    timeout-minutes: 25
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Clean gitignored data from previous runs
        shell: bash
        run: git clean -fdX data/

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npx playwright install chromium

      - name: Update snapshots
        shell: bash
        env:
          GREP: ${{ inputs.grep }}
        run: |
          if [ -n "$GREP" ]; then
            echo "Updating snapshots filtered by: $GREP"
            npm run test:e2e -- e2e/dashboard.spec.ts -g "$GREP" --update-snapshots=all
          else
            echo "Updating ALL snapshots"
            npm run test:e2e -- --update-snapshots=all
          fi

      - name: Upload regenerated snapshots as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regenerated-snapshots
          path: dashboard/e2e/dashboard.spec.ts-snapshots/*.png
          if-no-files-found: warn
          retention-days: 7

      - name: Commit and push updated snapshots
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          GREP: ${{ inputs.grep }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'dashboard/e2e/**/*.png' || true
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
            exit 0
          fi
          if [ -n "$GREP" ]; then
            SCOPE="(filter: $GREP)"
          else
            SCOPE="(all)"
          fi
          git commit -m "chore(e2e): regenerate dashboard snapshots from self-hosted runner $SCOPE"
          git push origin HEAD:main
