name: Private Runtime Preview Gate

on:
  pull_request:
    paths:
      - "dashboard/app/admin/**"
      - "dashboard/app/api/admin/**"
      - "dashboard/app/api/checkpoints/**"
      - "dashboard/app/api/event-access/**"
      - "dashboard/app/api/monitoring/**"
      - "dashboard/app/api/workshop/**"
      - "dashboard/db/**"
      - "dashboard/lib/**"
      - ".github/workflows/private-runtime-preview-gate.yml"

jobs:
  verify-private-runtime:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      HARNESS_TEST_DATABASE_URL: ${{ secrets.HARNESS_TEST_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - name: Require preview-grade Neon test database
        run: test -n "$HARNESS_TEST_DATABASE_URL"

      - run: npm test -- neon-runtime.integration.test.ts

      - run: npm run lint

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
