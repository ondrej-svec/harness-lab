name: Content Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  content-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Verify generated content matches bilingual source
        run: bun scripts/content/generate-views.ts --verify

      - name: Check Czech anglicism reject list
        run: bun scripts/content/check-czech-anglicisms.ts

      - name: Check Tier 2 locale sync
        run: bun scripts/content/check-tier2-sync.ts
