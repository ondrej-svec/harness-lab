name: Harness CLI Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to validate against package.json, for example harness-cli-v0.1.0"
        required: false
        type: string
  release:
    types:
      - published

permissions: read-all

concurrency:
  group: harness-cli-publish-${{ github.event_name }}-${{ github.event.release.tag_name || inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  verify-cli-package:
    name: verify-cli-package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness-cli
    permissions:
      contents: read
    outputs:
      package_version: ${{ steps.package_meta.outputs.version }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      tarball_name: ${{ steps.pack.outputs.tarball_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - id: package_meta
        name: Read package version
        shell: bash
        run: |
          VERSION="$(node -p 'JSON.parse(require("node:fs").readFileSync("./package.json", "utf8")).version')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - id: release_meta
        name: Resolve release tag
        shell: bash
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG="${RELEASE_EVENT_TAG:-${INPUT_RELEASE_TAG}}"
          if [ -z "${TAG}" ]; then
            TAG="harness-cli-v${{ steps.package_meta.outputs.version }}"
          fi
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate release tag shape
        shell: bash
        run: |
          EXPECTED_TAG="harness-cli-v${{ steps.package_meta.outputs.version }}"
          if [ "${{ steps.release_meta.outputs.release_tag }}" != "${EXPECTED_TAG}" ]; then
            echo "Expected release tag ${EXPECTED_TAG}, got ${{ steps.release_meta.outputs.release_tag }}"
            exit 1
          fi

      - name: Install CLI dependencies
        run: npm ci

      - name: Audit CLI dependencies
        run: npm audit --audit-level=high

      - run: npm run verify:workshop-bundle

      - run: npm test

      - id: pack
        name: Pack CLI tarball
        shell: bash
        run: |
          TARBALL="$(npm pack | tail -n 1)"
          echo "tarball_name=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Install packed tarball in smoke project
        shell: bash
        run: |
          mkdir -p ../tmp/harness-cli-release-smoke
          cd ../tmp/harness-cli-release-smoke
          npm init -y
          npm install "../../harness-cli/${{ steps.pack.outputs.tarball_name }}"

      - name: Run CLI help smoke test
        shell: bash
        run: |
          ../tmp/harness-cli-release-smoke/node_modules/.bin/harness --help

      - name: Run portable skill install smoke test
        shell: bash
        run: |
          mkdir -p ../tmp/harness-cli-release-target
          ../tmp/harness-cli-release-smoke/node_modules/.bin/harness skill install --target ../tmp/harness-cli-release-target

      - name: Run portable skill reinstall smoke test
        shell: bash
        run: |
          ../tmp/harness-cli-release-smoke/node_modules/.bin/harness skill install --target ../tmp/harness-cli-release-target

      - name: Upload packed tarball
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: harness-cli-tarball
          path: harness-cli/${{ steps.pack.outputs.tarball_name }}

      - name: Write workflow summary
        run: |
          {
            echo "## Harness CLI package verification"
            echo
            echo "- Package: \`@harness-lab/cli\`"
            echo "- Version: \`${{ steps.package_meta.outputs.version }}\`"
            echo "- Release tag: \`${{ steps.release_meta.outputs.release_tag }}\`"
            echo "- Tarball: \`${{ steps.pack.outputs.tarball_name }}\`"
            echo "- Publish mode: \`${{ github.event_name == 'release' && 'publish' || 'dry-run' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        with:
          args: detect --source . --no-git

      - name: SAST (Semgrep)
        uses: docker://semgrep/semgrep@sha256:17d89ddd91a7729bbd5de09402f7f79a70204289e2a94635086e9db532a495f2
        with:
          args: semgrep scan --config auto --error harness-cli/bin harness-cli/src harness-cli/scripts

  publish-cli-to-npm:
    name: publish-cli-to-npm
    needs:
      - verify-cli-package
      - security-scan
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness-cli
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install CLI dependencies
        run: npm ci

      - name: Publish package to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Write publish summary
        run: |
          {
            echo "## Harness CLI published with provenance"
            echo
            echo "- Package: \`@harness-lab/cli\`"
            echo "- Version: \`${{ needs.verify-cli-package.outputs.package_version }}\`"
            echo "- Release tag: \`${{ needs.verify-cli-package.outputs.release_tag }}\`"
            echo "- Provenance: Sigstore-signed, linked to this workflow run"
          } >> "$GITHUB_STEP_SUMMARY"
