name: Dashboard CI

on:
  push:
    paths:
      - "harness-cli/**"
      - "docs/harness-cli-*.md"
      - "workshop-skill/**"
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
      - ".github/workflows/harness-cli-publish.yml"
  pull_request:
    paths:
      - "harness-cli/**"
      - "docs/harness-cli-*.md"
      - "workshop-skill/**"
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
      - ".github/workflows/harness-cli-publish.yml"

concurrency:
  group: dashboard-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-harness-cli:
    name: verify-harness-cli (${{ matrix.name }}, Node ${{ matrix.node_version }})
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-latest
            runs_on: '"ubuntu-latest"'
            node_version: 22
          - name: windows-latest
            runs_on: '"windows-latest"'
            node_version: 22
          - name: linux-self-hosted
            runs_on: '["self-hosted","Linux","ARM64"]'
            node_version: 25
    defaults:
      run:
        working-directory: harness-cli
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: harness-cli/package-lock.json

      - run: npm ci

      - run: npm run verify:workshop-bundle

      - run: npm test

      - run: npm pack

      - name: Install packed CLI tarball
        shell: bash
        run: |
          TARBALL="$(ls -1 *.tgz | head -n 1)"
          mkdir -p ../tmp/harness-cli-smoke
          cd ../tmp/harness-cli-smoke
          npm init -y
          npm install "../../harness-cli/${TARBALL}"

      - name: Run CLI help smoke test
        shell: bash
        run: |
          ../tmp/harness-cli-smoke/node_modules/.bin/harness --help

      - name: Run portable skill install smoke test
        shell: bash
        run: |
          mkdir -p ../tmp/harness-cli-target-repo
          ../tmp/harness-cli-smoke/node_modules/.bin/harness skill install --target ../tmp/harness-cli-target-repo

      - name: Run portable skill reinstall smoke test
        shell: bash
        run: |
          ../tmp/harness-cli-smoke/node_modules/.bin/harness skill install --target ../tmp/harness-cli-target-repo

  verify-dashboard:
    name: verify-dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    permissions:
      contents: read
    env:
      HARNESS_TEST_DATABASE_URL: ${{ secrets.HARNESS_TEST_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - run: npm test

      - run: npm run lint

      - run: npm run build

      - if: env.HARNESS_TEST_DATABASE_URL != ''
        run: npm test -- neon-runtime.integration.test.ts

      - if: env.HARNESS_TEST_DATABASE_URL != ''
        run: npm test -- neon-auth.integration.test.ts

  e2e-dashboard:
    name: e2e-dashboard
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    needs:
      - verify-harness-cli
      - verify-dashboard
    defaults:
      run:
        working-directory: dashboard
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npx playwright install chromium

      - run: npm run test:e2e

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks

      - name: Scan git history for secrets
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${PR_BASE_SHA}" ] && [ -n "${PR_HEAD_SHA}" ]; then
            LOG_OPTS="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [ -n "${PUSH_BEFORE_SHA}" ] && [ "${PUSH_BEFORE_SHA}" != "${ZERO_SHA}" ]; then
            LOG_OPTS="${PUSH_BEFORE_SHA}..${GITHUB_SHA}"
          elif git rev-parse "${GITHUB_SHA}^" >/dev/null 2>&1; then
            LOG_OPTS="$(git rev-parse "${GITHUB_SHA}^")..${GITHUB_SHA}"
          else
            LOG_OPTS="${GITHUB_SHA}"
          fi

          /tmp/gitleaks git --exit-code 1 --log-opts="${LOG_OPTS}" .

  sast-semgrep:
    name: sast-semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - run: semgrep scan --config auto --error dashboard/app dashboard/lib dashboard/scripts harness-cli/bin harness-cli/src harness-cli/scripts

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request' && (!github.event.repository.private || vars.ENABLE_DEPENDENCY_REVIEW == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4

  audit-packages:
    name: audit-packages (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - dashboard
          - harness-cli
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - run: npm ci

      - run: npm audit --audit-level=high

  deploy-ready:
    name: deploy-ready
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    needs:
      - verify-dashboard
      - verify-harness-cli
      - e2e-dashboard
      - secret-scan
      - sast-semgrep
      - dependency-review
      - audit-packages
    steps:
      - name: Assess aggregate CI result
        id: assess
        env:
          VERIFY_RESULT: ${{ needs.verify-dashboard.result }}
          CLI_RESULT: ${{ needs.verify-harness-cli.result }}
          E2E_RESULT: ${{ needs.e2e-dashboard.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          SAST_SEMGREP_RESULT: ${{ needs.sast-semgrep.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          AUDIT_PACKAGES_RESULT: ${{ needs.audit-packages.result }}
        run: |
          echo "verify-harness-cli: ${CLI_RESULT}"
          echo "verify-dashboard: ${VERIFY_RESULT}"
          echo "e2e-dashboard: ${E2E_RESULT}"
          echo "secret-scan: ${SECRET_SCAN_RESULT}"
          echo "sast-semgrep: ${SAST_SEMGREP_RESULT}"
          echo "dependency-review: ${DEPENDENCY_REVIEW_RESULT}"
          echo "audit-packages: ${AUDIT_PACKAGES_RESULT}"

          STATE="success"
          DESCRIPTION="Ready for Vercel promotion"

          if [ "${CLI_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="verify-harness-cli failed"
          fi

          if [ "${VERIFY_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="verify-dashboard failed"
          fi

          if [ "${STATE}" = "success" ] && [ "${E2E_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="e2e-dashboard failed"
          fi

          if [ "${STATE}" = "success" ] && [ "${SECRET_SCAN_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="secret-scan failed"
          fi

          if [ "${STATE}" = "success" ] && [ "${SAST_SEMGREP_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="sast-semgrep failed"
          fi

          if [ "${STATE}" = "success" ] && [ "${DEPENDENCY_REVIEW_RESULT}" != "success" ] && [ "${DEPENDENCY_REVIEW_RESULT}" != "skipped" ]; then
            STATE="failure"
            DESCRIPTION="dependency-review failed"
          fi

          if [ "${STATE}" = "success" ] && [ "${AUDIT_PACKAGES_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="audit-packages failed"
          fi

          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "description=${DESCRIPTION}" >> "$GITHUB_OUTPUT"

      - name: Publish Vercel promotion status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ steps.assess.outputs.state }}',
              context: 'Vercel - harness-lab-dashboard: deploy-ready',
              description: '${{ steps.assess.outputs.description }}',
            });

      - name: Fail if aggregate CI failed
        if: steps.assess.outputs.state != 'success'
        run: exit 1
