name: Dashboard CI

on:
  push:
    paths:
      - "harness-cli/**"
      - "docs/harness-cli-*.md"
      - "workshop-skill/**"
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
      - ".github/workflows/harness-cli-publish.yml"
  pull_request:
    paths:
      - "harness-cli/**"
      - "docs/harness-cli-*.md"
      - "workshop-skill/**"
      - "dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
      - ".github/workflows/harness-cli-publish.yml"

concurrency:
  group: dashboard-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-harness-cli:
    name: verify-harness-cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        working-directory: harness-cli
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm test

      - run: npm pack

      - name: Install packed CLI tarball
        shell: bash
        run: |
          TARBALL="$(ls -1 *.tgz | head -n 1)"
          mkdir -p ../tmp/harness-cli-smoke
          cd ../tmp/harness-cli-smoke
          npm init -y
          npm install "../../harness-cli/${TARBALL}"

      - name: Run CLI help smoke test
        shell: bash
        run: |
          ../tmp/harness-cli-smoke/node_modules/.bin/harness --help

  verify-dashboard:
    name: verify-dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    permissions:
      contents: read
    env:
      HARNESS_TEST_DATABASE_URL: ${{ secrets.HARNESS_TEST_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - run: npm test

      - run: npm run lint

      - run: npm run build

      - if: env.HARNESS_TEST_DATABASE_URL != ''
        run: npm test -- neon-runtime.integration.test.ts

      - if: env.HARNESS_TEST_DATABASE_URL != ''
        run: npm test -- neon-auth.integration.test.ts

  e2e-dashboard:
    name: e2e-dashboard
    runs-on: ubuntu-latest
    needs:
      - verify-harness-cli
      - verify-dashboard
    defaults:
      run:
        working-directory: dashboard
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-semgrep:
    name: sast-semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - run: semgrep scan --config auto --error dashboard/app dashboard/lib dashboard/scripts

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request' && (!github.event.repository.private || vars.ENABLE_DEPENDENCY_REVIEW == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  deploy-ready:
    name: deploy-ready
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    needs:
      - verify-dashboard
      - verify-harness-cli
      - e2e-dashboard
      - secret-scan
      - sast-semgrep
      - dependency-review
    steps:
      - name: Assess aggregate CI result
        id: assess
        env:
          VERIFY_RESULT: ${{ needs.verify-dashboard.result }}
          CLI_RESULT: ${{ needs.verify-harness-cli.result }}
          E2E_RESULT: ${{ needs.e2e-dashboard.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          SAST_SEMGREP_RESULT: ${{ needs.sast-semgrep.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
        run: |
          echo "verify-harness-cli: ${CLI_RESULT}"
          echo "verify-dashboard: ${VERIFY_RESULT}"
          echo "e2e-dashboard: ${E2E_RESULT}"
          echo "secret-scan: ${SECRET_SCAN_RESULT}"
          echo "sast-semgrep: ${SAST_SEMGREP_RESULT}"
          echo "dependency-review: ${DEPENDENCY_REVIEW_RESULT}"

          STATE="success"
          DESCRIPTION="Ready for Vercel promotion"

          if [ "${CLI_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="verify-harness-cli failed"
          fi

          if [ "${VERIFY_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="verify-dashboard failed"
          fi

          if [ "${STATE}" = "success" ] && [ "${E2E_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="e2e-dashboard failed"
          fi

          if [ "${STATE}" = "success" ] && [ "${SECRET_SCAN_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="secret-scan failed"
          fi

          if [ "${STATE}" = "success" ] && [ "${SAST_SEMGREP_RESULT}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="sast-semgrep failed"
          fi

          if [ "${STATE}" = "success" ] && [ "${DEPENDENCY_REVIEW_RESULT}" != "success" ] && [ "${DEPENDENCY_REVIEW_RESULT}" != "skipped" ]; then
            STATE="failure"
            DESCRIPTION="dependency-review failed"
          fi

          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "description=${DESCRIPTION}" >> "$GITHUB_OUTPUT"

      - name: Publish Vercel promotion status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ steps.assess.outputs.state }}',
              context: 'Vercel - harness-lab-dashboard: deploy-ready',
              description: '${{ steps.assess.outputs.description }}',
            });

      - name: Fail if aggregate CI failed
        if: steps.assess.outputs.state != 'success'
        run: exit 1
