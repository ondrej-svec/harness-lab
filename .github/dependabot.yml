version: 2

updates:
  - package-ecosystem: npm
    directory: /harness-cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - harness-cli

  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - dashboard

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
